name: Build Meridian

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          prefix-key: 'v1'

      - name: Install frontend deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Download Ollama sidecar
        run: node scripts/ensure-ollama.mjs

      - name: Verify sidecar binaries
        shell: bash
        run: ls -lh src-tauri/binaries/

      - name: Cargo build (diagnostic)
        continue-on-error: true
        shell: bash
        working-directory: src-tauri
        run: |
          cargo build --release --target x86_64-pc-windows-msvc 2>&1 | tee /tmp/cargo_build.txt || true
          echo "## Cargo build output (Windows)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -300 /tmp/cargo_build.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Meridian ${{ github.ref_name }}"
          releaseBody: "AI-powered personal productivity assistant. Runs 100% locally - no cloud, no subscriptions. On first launch, Meridian guides you through a one-time AI model download (~2.3 GB). No other software needed - Ollama AI engine is bundled inside the installer."
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc

  build-macos:
    name: macOS Universal (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          prefix-key: 'v1'

      - name: Install frontend deps
        run: npm ci

      - name: Download Ollama sidecar
        run: node scripts/ensure-ollama.mjs

      - name: Verify sidecar binaries
        run: ls -lh src-tauri/binaries/

      - name: Cargo check (diagnostic)
        continue-on-error: true
        working-directory: src-tauri
        run: |
          cargo check --release --target aarch64-apple-darwin 2>&1 | tee /tmp/cargo_check.txt || true
          echo "## Cargo check (macOS)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/cargo_check.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Meridian ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin
